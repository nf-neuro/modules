# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: connectivity_afdfixel
description: |
  Compute the mean Apparent Fiber Density (AFD) and mean Radial fODF (radfODF)
  maps for every connections within a hdf5 (.h5) file.
keywords:
  - connectivity
  - AFD_Fixel
  - Metrics
tools:
  - scilpy:
      description: The Sherbrooke Connectivity Imaging Lab (SCIL) Python dMRI processing
        toolbox.
      homepage: https://github.com/scilus/scilpy.git
      identifier: ""
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. `[ id:'sample1', single_end:false ]`
    - hdf5:
        type: file
        description: HDF5 file containing decomposed connections.
        pattern: "*.h5"
        ontologies: []
    - fodf:
        type: file
        description: FODF file.
        pattern: "*.nii.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989 # GZIP format
args:
  - single_thread:
      type: boolean
      description: If true, the command will be run in single-threaded mode. By default, the command will use multiple threads based on the number of CPUs allocated to the task.
      default: false
output:
  hdf5:
    - - meta:
          type: map
          description: |
            Groovy Map containing sample information
            e.g. `[ id:'sample1', single_end:false ]`
      - "*__afd_fixel.h5":
          type: file
          description: HDF5 file containing the computed AFD fixel and radial fODF metrics.
          pattern: "*__afd_fixel.h5"
          ontologies: []
  versions:
    - versions.yml:
        type: file
        description: File containing software versions
        pattern: versions.yml
        ontologies:
          - edam: http://edamontology.org/format_3750 # YAML
authors:
  - "@gagnonanthony"
maintainers:
  - "@gagnonanthony"
