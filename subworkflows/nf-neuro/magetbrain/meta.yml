name: "magetbrain"
description: |
  MAGeT-Brain: Multiple Automatically Generated Templates Brain Segmentation.

  Performs multi-atlas segmentation through combinatorial registration and
  majority vote label fusion. The algorithm propagates atlas labels to subjects
  via an intermediate template library, leveraging neuroanatomical variability
  to improve segmentation accuracy.

  Pipeline steps:
    1. Register every atlas to every template (REGISTER_ATLAS_TEMPLATE)
    2. Register every template to every subject (REGISTER_TEMPLATE_SUBJECT)
    3. Chain transforms to resample atlas labels into subject space via every
        possible atlas-template-subject path (RESAMPLE_LABELS)
    4. Majority vote across all candidate labels per subject (IMAGE_ANTSMATH)

  Computational note: With A atlases, T templates, S subjects, and L labels per
  atlas, the subworkflow produces A*T + T*S registrations and A*T*S*L label
  resamplings.

  References:
    - Pipitone J, Park MT, Winterburn J, et al. Multi-atlas segmentation of the
      whole hippocampus and subfields using multiple automatically generated
      templates. Neuroimage. 2014.
    - Chakravarty MM, Steadman P, van Eede MC, et al. Performing label-fusion-
      based segmentation using multiple automatically generated templates.
      Hum Brain Mapp, 34(10):2635-54, October 2013.
      doi:10.1002/hbm.22092

  Implementation assistance: Claude (Anthropic).
  Models: Opus 4.6, Opus 4.7
keywords:
  - segmentation
  - multi-atlas
  - label fusion
  - majority voting
  - MAGeTBrain
  - registration
components:
  - registration/ants
  - registration/antsapplytransforms
  - image/antsmath
input:
  - ch_atlases:
      type: file
      description: |
        Channel containing atlas brain images. Each atlas may have one or more
        associated label files provided via ch_labels.
      structure:
        - meta:
            type: map
            description: |
              Metadata map. Must contain `id` (atlas identifier).
              e.g. `[ id:'atlas1' ]`
        - image:
            type: file
            description: Atlas brain image.
      pattern: "*.{nii,nii.gz}"
      mandatory: true
  - ch_labels:
      type: file
      description: |
        Channel containing atlas label (segmentation) files. The meta.id must
        match the corresponding atlas, and meta.label_tag identifies the label
        type (e.g. "_label_amygdala").
      structure:
        - meta:
            type: map
            description: |
              Metadata map. Must contain `id` (atlas identifier matching ch_atlases)
              and `label_tag` (label type identifier, e.g. "_label_amygdala").
              e.g. `[ id:'atlas1', label_tag:'_label_amygdala' ]`
        - label:
            type: file
            description: Atlas label segmentation file.
      pattern: "*.{nii,nii.gz}"
      mandatory: true
  - ch_templates:
      type: file
      description: |
        Channel containing template brain images. Templates serve as
        intermediate registration targets between atlases and subjects.
      structure:
        - meta:
            type: map
            description: |
              Metadata map. Must contain `id` (template identifier).
              e.g. `[ id:'template1' ]`
        - image:
            type: file
            description: Template brain image.
      pattern: "*.{nii,nii.gz}"
      mandatory: true
  - ch_subjects:
      type: file
      description: |
        Channel containing subject brain images to be segmented.
      structure:
        - meta:
            type: map
            description: |
              Metadata map. Must contain `id` (subject identifier).
              e.g. `[ id:'subject1' ]`
        - image:
            type: file
            description: Subject brain image.
      pattern: "*.{nii,nii.gz}"
      mandatory: true
output:
  - labels:
      type: file
      description: |
        Channel containing majority-voted segmentation labels for each subject
        and label type.
      structure:
        - meta:
            type: map
            description: |
              Metadata map containing `id` (composed of subject identifier and
              label tag, e.g. "subject1_label_amygdala").
        - label:
            type: file
            description: Majority-voted label segmentation file.
      pattern: "*_majorityvote.nii.gz"
  - versions:
      type: file
      description: |
        File containing software versions used.
      structure:
        - versions:
            type: file
            description: Versions YAML file.
      pattern: "versions.yml"
args:
  - single_thread:
      type: boolean
      description: Force single-threaded execution for registration and resampling processes.
      default: false
  - repro_mode:
      type: boolean
      description: Run registration in reproducibility mode (registration/ants only).
      default: false
authors:
  - "@CMonnin"
